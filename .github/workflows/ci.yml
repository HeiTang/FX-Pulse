name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "api/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "api/**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-${{ runner.os }}-${{ hashFiles('api/poetry.lock') }}

      - name: Install dependencies
        run: poetry install

      - name: Ruff lint
        run: poetry run ruff check src/ tests/

      - name: Ruff format check
        run: poetry run ruff format --check src/ tests/

      - name: Run tests
        run: poetry run pytest -v

      - name: Notify Discord on CI failure
        if: failure()
        run: |
          BRANCH="${{ github.ref_name }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          REPO="${{ github.repository }}"
          COMMIT_URL="https://github.com/$REPO/commit/$SHA"
          RUN_URL="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"❌ FX Pulse CI 失敗\",\"description\":\"**Branch:** \`$BRANCH\`\\n**Commit:** [\`$SHORT_SHA\`]($COMMIT_URL)\\n**Run:** $RUN_URL\",\"color\":15548997}]}" \
            "${{ secrets.DISCORD_WEBHOOK_CI_CD }}"
        continue-on-error: true
