name: Daily FX Scrape

on:
  schedule:
    # UTC 03:00 = JST 12:00 / Taiwan 11:00
    # - VISA: API available at midnight UTC; still accessible at 03:00
    # - JCB:  jcb.jp daily HTML page published ~JST 10:30; 12:00 gives safe margin
    - cron: "0 3 * * *"
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  fetch-rates:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-${{ runner.os }}-${{ hashFiles('api/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --only main

      - name: Fetch rates
        run: poetry run fetch-rates --result-file scrape_result.json

      - name: Backfill missing rates (last 7 days)
        run: poetry run backfill-rates --days 7 --result-file backfill_result.json
        continue-on-error: true

      - name: Check scrape status
        id: check-status
        if: always()
        run: |
          python - <<'PY' >> $GITHUB_OUTPUT
          import json, os
          path = 'scrape_result.json'
          try:
              if not os.path.exists(path):
                  print('has_failure=true')
              else:
                  r = json.load(open(path))
                  has_failure = r['status'] != 'ok'
                  print('has_failure=' + str(has_failure).lower())
          except Exception:
              print('has_failure=true')
          PY

      - name: Notify Discord — daily rates
        if: always()
        run: |
          poetry run python scripts/notify_discord.py \
            --mode daily \
            --webhook "${{ secrets.DISCORD_WEBHOOK_FX_DAILY }}" \
            --result-file scrape_result.json
        continue-on-error: true

      - name: Notify Discord — alert on failure
        if: steps.check-status.outputs.has_failure == 'true'
        run: |
          if [ ! -f scrape_result.json ]; then
            python - <<'PY'
            import json
            from datetime import date
            msg = 'process crashed before writing result file'
            payload = {
                'date': date.today().isoformat(),
                'status': 'error',
                'results': {
                    'VISA':       {'status': 'error', 'currencies': 0, 'error': msg},
                    'Mastercard': {'status': 'error', 'currencies': 0, 'error': msg},
                    'JCB':        {'status': 'error', 'currencies': 0, 'error': msg},
                },
            }
            open('scrape_result.json', 'w').write(json.dumps(payload))
          PY
          fi
          poetry run python scripts/notify_discord.py \
            --mode alert \
            --webhook "${{ secrets.DISCORD_WEBHOOK_FX_ALERTS }}" \
            --result-file scrape_result.json \
            --role-id "${{ secrets.DISCORD_ROLE_ID_ALERT }}"
        continue-on-error: true

      - name: Commit updated rates.json
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/src/data/rates.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: update rates.json [skip ci]"
          git push
