name: Daily FX Scrape

on:
  schedule:
    # UTC 00:00 = Taiwan 08:00 — VISA updates rates daily around midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  fetch-rates:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-${{ runner.os }}-${{ hashFiles('api/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --only main

      - name: Fetch rates
        run: poetry run fetch-rates

      - name: Commit updated rates.json
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/src/data/rates.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: update rates.json [skip ci]"
          git push
